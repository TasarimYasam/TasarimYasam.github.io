<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TasarimYasam</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 5px 10px;
        }
        .header {
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .profile-img {
            width: 113px;
            height: 113px;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            object-fit: cover;
            display: block;
            margin: 0 auto;
        }
        h3 {
            margin: 5px 0 0 0;
            color: #333;
        }
        .description {
            font-size: 16px;
            color: #333;
            max-width: 400px;
            margin: 2px auto 10px auto;
            font-weight: 500;
        }
        .btn {
            display: block;
            width: 94%; 
            max-width: 400px;
            margin: 12px auto;
            padding: 13px 0;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        
        /* Renkler */
        .yt { background-color: #FF0000; }
        .tt { background-color: #000000; }
        .rumble { background-color: #87C232; }
        .dm { background-color: #0066DC; }
        .tg { background-color: #0088cc; }
        .ig { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .tw { background-color: #1DA1F2; }
        .wa { background-color: #25D366; }
        .pt { background-color: #FF424D; }
        .fb { background-color: #4267B2; }
        .com { background-color: #555; }

        /* Video Oynatıcı Alanı */
        .video-container {
            width: 94%;
            max-width: 400px;
            margin: 25px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Oranı için */
            height: 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="https://youtube.com/@TasarimYasam">
            <img src="https://yt3.googleusercontent.com/ydUT4FcJQTB79eCMG-yBHpApCFwxFWAKfl9Sv9vHCjuMFgEEHAVi9GYtHK-uAg73tmaNByll=s160-c-k-c0x00ffffff-no-rj" alt="TasarimYasam Logo" class="profile-img">
        </a>
        
        <a href="https://youtube.com/@TasarimYasam" style="text-decoration: none; color: inherit;">
            <h3>TasarimYasam</h3>
        </a>
        
        <p class="description">Bağımsız Yayıncılığıma Hoşgeldiniz Tüm Güncel İçeriklerime Buradan Ulaşabilirsiniz.</p>
    </div>

    <a href="https://youtube.com/@TasarimYasam" class="btn yt">YouTube</a>
    <a href="https://www.youtube.com/channel/UCNQpjQqIsdUkKjsulWjngJA/join" class="btn dm">Özel Katıl Üyeliği</a>
    <a href="https://www.youtube.com/playlist?list=UUMONQpjQqIsdUkKjsulWjngJA" class="btn ig">Katıl Üyeliği Videoları</a>
    <a href="https://www.tiktok.com/@tasarimyasam" class="btn tt">TikTok</a>
    <a href="https://www.rumble.com/user/TasarimYasam" class="btn rumble">Rumble</a>
    <a href="https://www.dailymotion.com/TasarimYasam" class="btn dm">Dailymotion</a>
    <a href="https://t.me/TasarimYasam" class="btn tg">Telegram</a>
    <a href="https://www.instagram.com/tasarim_yasam" class="btn ig">Instagram</a>
    <a href="https://www.x.com/TasarimYasam" class="btn tw">Twitter (X)</a>
    <a href="https://whatsapp.com/channel/0029Vb9QYvwAu3aVlG74Zi24" class="btn wa">WhatsApp</a>
    <a href="https://www.patreon.com/@MutinousTube" class="btn pt">Patreon</a>
    <a href="https://odysee.com/@TasarimYasam" class="btn dm">Odysee</a>
    <a href="https://www.facebook.com/TasarimYasam" class="btn fb">Facebook</a>
    <a href="https://youtube.com/@tasarimyasam/community?si=lX7STw3SHoXTHqV2" class="btn com">Topluluk</a>

    <!-- YouTube Video Oynatıcı (Sesli ve Otomatik Oynatma Etiketli) -->
    <div class="video-container">
        <iframe 
            id="youtube-player"
            src="https://www.youtube.com/embed/videoseries?list=PLybU7OTioIXmOjoyczXoOiPb23laSHZMe&autoplay=1" 
            title="YouTube video player" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            allowfullscreen>
        </iframe>
    </div>

    <!-- Tarayıcı Engeli Aşan Ses Tetikleyici Script -->
    <script>
        const playVideoOnInteraction = () => {
            const iframe = document.getElementById('youtube-player');
            if (iframe) {
                // Mevcut src yapısını koruyarak yeniden yükler ve sesli oynatmayı tetikler
                const currentSrc = iframe.src;
                iframe.src = currentSrc; 
            }
            // Tetiklendikten sonra performansı düşürmemek için dinleyicileri kaldırır
            document.removeEventListener('click', playVideoOnInteraction);
            document.removeEventListener('touchstart', playVideoOnInteraction);
        };

        // Kullanıcı sayfaya dokunduğu veya tıkladığı an sesi açıp başlatır
        document.addEventListener('click', playVideoOnInteraction);
        document.addEventListener('touchstart', playVideoOnInteraction);
    </script>

</body>
</html>
